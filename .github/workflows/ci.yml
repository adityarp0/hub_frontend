name: Frontend CI

on:
  pull_request:
    branches:
      - cg2

  push:
    branches:
      - main
      - cg2

  workflow_dispatch:

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci 

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Check
        run: npx tsc --noEmit

      - name: Build Next.js Application
        run: npm run build

      - name: Build Docker Image
        run: docker build -t hub_frontend .